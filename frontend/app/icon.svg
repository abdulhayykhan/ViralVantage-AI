<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ViralVantage-AI icon</title>
  <desc id="desc">Glowing play button merged with an upward trending analytics chart</desc>
  <defs>
    <linearGradient id="emeraldGlow" x1="12" y1="10" x2="52" y2="54" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6EE7B7"/>
      <stop offset="0.48" stop-color="#10B981"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="glassHighlight" x1="20" y1="16" x2="44" y2="46" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ECFDF5" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ECFDF5" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="64" height="64" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
